<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>EchoNex Navigation</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');
  :root{--bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a26;--accent:#7fffb2;--accent2:#5b8fff;--danger:#ff5b5b;--warning:#ffda5b;--text:#e8e8f0;--dim:#6a6a8a;--border:rgba(255,255,255,0.06);--r:14px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden}
  /* SETUP */
  .setup{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:18px}
  .setup-logo{font-family:'Space Mono',monospace;font-size:26px;font-weight:700;color:var(--accent);letter-spacing:.1em}
  .setup-sub{font-size:12px;color:var(--dim);text-align:center;line-height:1.6}
  .setup-form{width:100%;max-width:360px;display:flex;flex-direction:column;gap:8px}
  .slabel{font-size:10px;color:var(--dim);font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:.08em;margin-bottom:-2px}
  .sinput{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:13px 14px;color:var(--text);font-family:'Space Mono',monospace;font-size:11px;outline:none}
  .sinput:focus{border-color:var(--accent)}
  .sinput::placeholder{color:var(--dim)}
  .btn-start{background:var(--accent);color:#0a0a0f;border:none;border-radius:var(--r);padding:15px;font-family:'Space Mono',monospace;font-size:13px;font-weight:700;cursor:pointer;margin-top:6px}
  /* TOPBAR */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:13px 16px 10px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10}
  .logo{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;letter-spacing:.08em;color:var(--accent)}
  .logo span{color:var(--dim)}
  .status{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--dim);font-family:'Space Mono',monospace}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--dim);transition:all .3s}
  .dot.on{background:var(--accent);box-shadow:0 0 7px var(--accent)}
  .dot.pulse{animation:pulse 1.4s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  #map{flex:1;min-height:0}
  .panel{background:var(--surface);border-top:1px solid var(--border);padding:12px 14px 18px;display:flex;flex-direction:column;gap:9px;flex-shrink:0}
  .instr{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:9px 13px;min-height:48px;transition:border-color .3s}
  .instr.left{border-color:var(--accent2)}.instr.right{border-color:var(--accent)}.instr.fwd{border-color:var(--warning)}.instr.arrive{border-color:var(--accent);background:rgba(127,255,178,.07)}
  .instr-icon{font-size:20px;width:30px;text-align:center;flex-shrink:0}
  .instr-body{flex:1;min-width:0}
  .instr-main{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .instr-sub{font-size:10px;color:var(--dim);margin-top:1px}
  .instr-dist{font-family:'Space Mono',monospace;font-size:11px;color:var(--accent);font-weight:700;flex-shrink:0}
  /* SEARCH */
  .search-row{display:flex;gap:7px;align-items:flex-start}
  .search-wrap{flex:1;position:relative}
  .dest-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border .2s}
  .dest-input:focus{border-color:var(--accent2)}
  .dest-input::placeholder{color:var(--dim)}
  /* DROPDOWN */
  .dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;z-index:50;display:none;box-shadow:0 8px 24px rgba(0,0,0,.5)}
  .dropdown.show{display:block}
  .drop-item{padding:11px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s}
  .drop-item:last-child{border-bottom:none}
  .drop-item:hover,.drop-item:active{background:rgba(127,255,178,.08)}
  .drop-main{font-size:12px;font-weight:500;color:var(--text)}
  .drop-sub{font-size:10px;color:var(--dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .btn-go{background:var(--accent);color:#0a0a0f;border:none;border-radius:var(--r);padding:0 16px;height:44px;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0}
  .btn-go:disabled{opacity:.35;cursor:not-allowed}
  .btn-stop{background:transparent;border:1px solid var(--danger);color:var(--danger);border-radius:var(--r);padding:0 12px;height:44px;font-family:'Space Mono',monospace;font-size:10px;cursor:pointer;display:none;flex-shrink:0}
  .info-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
  .icard{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:7px 9px}
  .ilabel{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.07em;font-family:'Space Mono',monospace}
  .ival{font-size:14px;font-weight:500;margin-top:2px}
  .ival.a{color:var(--accent)}.ival.w{color:var(--warning)}
  .manual-row{display:flex;gap:5px}
  .mbtn{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 2px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;transition:all .2s;font-size:8px;color:var(--dim);font-family:'Space Mono',monospace}
  .mbtn:active,.mbtn.lit{background:rgba(127,255,178,.1);border-color:var(--accent);color:var(--accent)}
  .mbtn .mi{font-size:14px}
  .log{font-family:'Space Mono',monospace;font-size:9px;color:var(--dim);text-align:center;min-height:12px}
  .log.ok{color:var(--accent)}.log.err{color:var(--danger)}.log.w{color:var(--warning)}
  .flash{animation:flash .35s ease}
  @keyframes flash{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}
</style>
</head>
<body>

<div class="setup" id="setup">
  <div class="setup-logo">ECHONEX</div>
  <div class="setup-sub">Smart Shoe Navigation System<br>Enter your credentials to continue</div>
  <div class="setup-form">
    <div class="slabel">Blynk Auth Token</div>
    <input class="sinput" id="inToken" placeholder="your_blynk_token" type="password">
    <div class="slabel">Google Maps API Key</div>
    <input class="sinput" id="inMaps" placeholder="your_google_maps_api_key">
    <div class="slabel">Turn Alert Distance (meters)</div>
    <input class="sinput" id="inDist" placeholder="15" value="15" type="number">
    <button class="btn-start" onclick="startApp()">START →</button>
  </div>
</div>

<div class="topbar">
  <div class="logo">ECHO<span>NEX</span></div>
  <div class="status">
    <div class="dot pulse" id="dot"></div>
    <span id="stxt">connecting...</span>
  </div>
</div>

<div id="map"></div>

<div class="panel">
  <div class="instr" id="instr">
    <div class="instr-icon" id="iIcon">🧭</div>
    <div class="instr-body">
      <div class="instr-main" id="iMain">Enter a destination to start</div>
      <div class="instr-sub" id="iSub">Locating GPS...</div>
    </div>
    <div class="instr-dist" id="iDist2"></div>
  </div>
  <div class="info-row">
    <div class="icard"><div class="ilabel">Distance</div><div class="ival a" id="iD">—</div></div>
    <div class="icard"><div class="ilabel">Next turn</div><div class="ival w" id="iT">—</div></div>
    <div class="icard"><div class="ilabel">ETA</div><div class="ival" id="iE">—</div></div>
  </div>
  <div class="search-row">
    <div class="search-wrap">
      <input class="dest-input" id="destInput" placeholder="Search destination..." autocomplete="off">
      <div class="dropdown" id="dropdown"></div>
    </div>
    <button class="btn-go" id="btnGo" onclick="startRoute()">GO</button>
    <button class="btn-stop" id="btnStop" onclick="stopNav()">STOP</button>
  </div>
  <div class="manual-row">
    <button class="mbtn" onclick="send(1)" id="mb1"><span class="mi">⬆️</span>FWD</button>
    <button class="mbtn" onclick="send(2)" id="mb2"><span class="mi">↰</span>Rt 45°</button>
    <button class="mbtn" onclick="send(3)" id="mb3"><span class="mi">↱</span>Rt 90°</button>
    <button class="mbtn" onclick="send(4)" id="mb4"><span class="mi">↩</span>U-turn</button>
    <button class="mbtn" onclick="send(5)" id="mb5"><span class="mi">⚠️</span>ALERT</button>
    <button class="mbtn" onclick="send(6)" id="mb6"><span class="mi">🏁</span>ARRIVE</button>
  </div>
  <div class="log" id="log">waiting...</div>
</div>

<script>
let BLYNK_TOKEN='',MAPS_KEY='',ALERT_DIST=15;
const BLYNK='https://blynk.cloud/external/api';
let map,dirSvc,dirRend,userMarker,pos=null,steps=[],stepIdx=0,navigating=false,lastPin=null;
let sessionToken=null, AutocompleteSuggestion=null, Place=null;
let selectedLatLng=null, debounceTimer=null;

function startApp(){
  BLYNK_TOKEN=document.getElementById('inToken').value.trim();
  MAPS_KEY=document.getElementById('inMaps').value.trim();
  ALERT_DIST=parseInt(document.getElementById('inDist').value)||15;
  if(!BLYNK_TOKEN||!MAPS_KEY){alert('Please fill in all fields!');return;}
  document.getElementById('setup').style.display='none';
  startGPS();
  loadMaps();
  pingShoe();
}

function loadMaps(){
  const s=document.createElement('script');
  s.src=`https://maps.googleapis.com/maps/api/js?key=${MAPS_KEY}&callback=initMap&loading=async&libraries=places`;
  s.async=true;
  s.onerror=()=>setLog('Maps API error','err');
  document.head.appendChild(s);
}

window.initMap=async function(){
  map=new google.maps.Map(document.getElementById('map'),{
    zoom:18,center:{lat:32.08,lng:-81.09},
    disableDefaultUI:true,gestureHandling:'greedy',
    styles:[
      {elementType:'geometry',stylers:[{color:'#12121a'}]},
      {elementType:'labels.text.fill',stylers:[{color:'#6a6a8a'}]},
      {elementType:'labels.text.stroke',stylers:[{color:'#0a0a0f'}]},
      {featureType:'road',elementType:'geometry',stylers:[{color:'#1c1c2e'}]},
      {featureType:'road.arterial',elementType:'geometry',stylers:[{color:'#22223a'}]},
      {featureType:'water',elementType:'geometry',stylers:[{color:'#0a0a18'}]},
      {featureType:'poi',stylers:[{visibility:'off'}]},
      {featureType:'transit',stylers:[{visibility:'off'}]},
    ]
  });
  dirSvc=new google.maps.DirectionsService();
  dirRend=new google.maps.DirectionsRenderer({
    suppressMarkers:true,
    polylineOptions:{strokeColor:'#7fffb2',strokeWeight:4,strokeOpacity:.85}
  });
  dirRend.setMap(map);

  // Load new Places library
  try {
    const placesLib = await google.maps.importLibrary('places');
    AutocompleteSuggestion = placesLib.AutocompleteSuggestion;
    Place = placesLib.Place;
    sessionToken = new placesLib.AutocompleteSessionToken();
    setLog('Map ready ✓','ok');
  } catch(e){
    setLog('Map ready (basic mode) ✓','ok');
  }

  // Input listener
  document.getElementById('destInput').addEventListener('input', onSearchInput);
  document.getElementById('destInput').addEventListener('blur', ()=>{
    setTimeout(()=>hideDropdown(), 200);
  });
}

async function onSearchInput(e){
  const q = e.target.value.trim();
  if(!q || q.length < 2){ hideDropdown(); return; }

  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(async ()=>{
    if(!AutocompleteSuggestion){ return; }
    try {
      const {suggestions} = await AutocompleteSuggestion.fetchAutocompleteSuggestions({
        input: q,
        sessionToken: sessionToken,
        locationBias: pos ? new google.maps.LatLng(pos.latitude, pos.longitude) : undefined,
      });
      showDropdown(suggestions);
    } catch(err){
      setLog('Search error','err');
    }
  }, 300);
}

function showDropdown(suggestions){
  const dd = document.getElementById('dropdown');
  dd.innerHTML = '';
  if(!suggestions || !suggestions.length){ hideDropdown(); return; }

  suggestions.slice(0,5).forEach(s=>{
    const pred = s.placePrediction;
    const item = document.createElement('div');
    item.className = 'drop-item';
    item.innerHTML = `
      <div class="drop-main">${pred.mainText?.toString() || pred.text.toString()}</div>
      <div class="drop-sub">${pred.secondaryText?.toString() || ''}</div>
    `;
    item.addEventListener('mousedown', async ()=>{
      document.getElementById('destInput').value = pred.text.toString();
      hideDropdown();

      // Fetch place location
      try {
        const place = pred.toPlace();
        await place.fetchFields({fields:['location','displayName']});
        selectedLatLng = {
          lat: place.location.lat(),
          lng: place.location.lng()
        };
        setLog('📍 '+place.displayName,'ok');
      } catch(err){
        selectedLatLng = null;
        setLog('Place selected (text mode)','w');
      }
    });
    dd.appendChild(item);
  });
  dd.classList.add('show');
}

function hideDropdown(){
  document.getElementById('dropdown').classList.remove('show');
}

function startGPS(){
  if(!navigator.geolocation){setLog('GPS not supported','err');return;}
  navigator.geolocation.getCurrentPosition(snap,null,{enableHighAccuracy:true});
  navigator.geolocation.watchPosition(snap,null,{enableHighAccuracy:true,maximumAge:2000});
}

function snap(p){
  pos=p.coords;
  const ll={lat:pos.latitude,lng:pos.longitude};
  if(map){
    if(!userMarker){
      userMarker=new google.maps.Marker({position:ll,map,
        icon:{path:google.maps.SymbolPath.CIRCLE,scale:9,
              fillColor:'#7fffb2',fillOpacity:1,strokeColor:'#0a0a0f',strokeWeight:3}});
      map.setCenter(ll);
    } else {
      userMarker.setPosition(ll);
      if(!navigating) map.panTo(ll);
    }
  }
  document.getElementById('iSub').textContent='GPS locked ✓';
  if(navigating) checkNav();
}

function startRoute(){
  const dest = selectedLatLng || document.getElementById('destInput').value.trim();
  if(!dest){setLog('Please enter a destination','w');return;}
  if(!pos){setLog('GPS not ready','w');return;}
  if(!dirSvc){setLog('Map not ready','w');return;}
  document.getElementById('btnGo').disabled=true;
  setLog('Calculating walking route...','w');
  dirSvc.route({
    origin:{lat:pos.latitude,lng:pos.longitude},
    destination:dest,
    travelMode:google.maps.TravelMode.WALKING
  },(res,status)=>{
    document.getElementById('btnGo').disabled=false;
    if(status!=='OK'){setLog('Route error: '+status,'err');return;}
    dirRend.setDirections(res);
    const leg=res.routes[0].legs[0];
    steps=leg.steps;stepIdx=0;navigating=true;
    document.getElementById('iD').textContent=leg.distance.text;
    document.getElementById('iE').textContent=leg.duration.text;
    document.getElementById('btnStop').style.display='block';
    updateInstr();
    setLog('Walking route started ✓','ok');
    send(1);
  });
}

function stopNav(){
  navigating=false;steps=[];stepIdx=0;lastPin=null;selectedLatLng=null;
  dirRend.setDirections({routes:[]});
  document.getElementById('btnStop').style.display='none';
  document.getElementById('destInput').value='';
  document.getElementById('iD').textContent='—';
  document.getElementById('iT').textContent='—';
  document.getElementById('iE').textContent='—';
  setInstr('🧭','Navigation stopped','','','');
  setLog('Stopped','w');
}

function checkNav(){
  if(!steps.length||stepIdx>=steps.length)return;
  const s=steps[stepIdx];
  const d=calcDist(pos.latitude,pos.longitude,s.end_location.lat(),s.end_location.lng());
  document.getElementById('iDist2').textContent=Math.round(d)+'m';
  document.getElementById('iT').textContent=Math.round(d)+'m';
  if(d<ALERT_DIST){
    const pin=mPin(s.maneuver||'');
    if(pin!==lastPin){lastPin=pin;send(pin);flashInstr();}
    if(d<5){
      stepIdx++;lastPin=null;
      if(stepIdx>=steps.length){
        navigating=false;send(6);
        setInstr('🏁','You have arrived!','Destination reached','','arrive');
        setLog('Arrived! ✓','ok');
      } else updateInstr();
    }
  }
}

function updateInstr(){
  if(stepIdx>=steps.length)return;
  const s=steps[stepIdx];const m=s.maneuver||'';
  setInstr(mIcon(m),s.instructions.replace(/<[^>]*>/g,''),
    'Step '+(stepIdx+1)+' of '+steps.length,s.distance.text,mCls(m));
}

function setInstr(icon,main,sub,d,cls){
  document.getElementById('iIcon').textContent=icon;
  document.getElementById('iMain').textContent=main;
  document.getElementById('iSub').textContent=sub;
  document.getElementById('iDist2').textContent=d;
  document.getElementById('instr').className='instr'+(cls?' '+cls:'');
}

function flashInstr(){
  const e=document.getElementById('instr');
  e.classList.add('flash');setTimeout(()=>e.classList.remove('flash'),400);
}

function mPin(m){if(m.includes('left'))return 2;if(m.includes('right'))return 3;if(m.includes('uturn'))return 4;return 1;}
function mIcon(m){if(m.includes('left'))return '⬅️';if(m.includes('right'))return '➡️';if(m.includes('uturn'))return '🔄';return '⬆️';}
function mCls(m){if(m.includes('left'))return 'left';if(m.includes('right'))return 'right';if(m.includes('arrive'))return 'arrive';return 'fwd';}

async function send(pin){
  const n={1:'FWD',2:'LEFT',3:'RIGHT',4:'HEEL',5:'ALERT',6:'ARRIVE'};
  litBtn(pin);setLog('→ shoe: '+n[pin],'ok');
  try{
    await fetch(`${BLYNK}/update?token=${BLYNK_TOKEN}&v${pin}=1`);
    setTimeout(()=>fetch(`${BLYNK}/update?token=${BLYNK_TOKEN}&v${pin}=0`),300);
  }catch(e){setLog('Blynk error','err');}
}

async function pingShoe(){
  try{
    const r=await fetch(`${BLYNK}/isHardwareConnected?token=${BLYNK_TOKEN}`);
    const on=(await r.text()).trim()==='true';
    document.getElementById('dot').className='dot'+(on?' on':' pulse');
    document.getElementById('stxt').textContent=on?'shoe online':'shoe offline';
  }catch(e){document.getElementById('stxt').textContent='no connection';}
  setTimeout(pingShoe,8000);
}

function litBtn(pin){
  const e=document.getElementById('mb'+pin);if(!e)return;
  e.classList.add('lit');setTimeout(()=>e.classList.remove('lit'),600);
}

function calcDist(la1,lo1,la2,lo2){
  const R=6371000,dL=(la2-la1)*Math.PI/180,dO=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dO/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function setLog(m,t=''){const e=document.getElementById('log');e.textContent=m;e.className='log '+t;}
</script>
</body>
</html>
